<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#bf5840" />
  <!-- Bistro monogram: a serif B in an oval plaque, cream on terracotta — the
       app icon and the "Bistro" wordmark share this mark. -->
  <ellipse cx="256" cy="256" rx="150" ry="172" fill="none" stroke="#fdf3e7" stroke-width="24" />
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="215"
    fill="#fdf3e7">B</text>
</svg>
