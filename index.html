    <title>Bistro — weekly meal planner</title>
    <!-- Apply the saved theme before paint so there's no flash. New visitors
         default to dark; Light / System (from Settings) override it. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme") || "dark";
          var dark =
            saved === "dark" ||
            (saved === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light"
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
